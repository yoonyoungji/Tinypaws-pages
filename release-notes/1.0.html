<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TinyPaws 1.0 Release Notes</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f8f1e7;
      --surface: rgba(255, 252, 247, 0.95);
      --text: #2d241e;
      --muted: #6f5d50;
      --line: rgba(94, 67, 49, 0.14);
      --accent-strong: #8f4227;
      --shadow: 0 18px 48px rgba(74, 44, 26, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 219, 179, 0.9), transparent 34%),
        linear-gradient(180deg, #fffaf4 0%, var(--bg) 100%);
      line-height: 1.65;
    }

    main {
      width: min(840px, calc(100% - 32px));
      margin: 0 auto;
      padding: 44px 0 64px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 32px;
    }

    h1, h2, p { margin-top: 0; }

    .eyebrow {
      color: var(--accent-strong);
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .muted {
      color: var(--muted);
    }

    ul {
      margin: 0;
      padding-left: 20px;
    }

    li + li {
      margin-top: 8px;
    }

    a {
      color: var(--accent-strong);
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <p class="eyebrow">TinyPaws</p>
      <h1>TinyPaws 1.0</h1>
      <p class="muted">First public direct-download release for macOS.</p>
      <h2>Highlights</h2>
      <ul>
        <li>Animated desktop pet overlay for macOS</li>
        <li>Character, size, opacity, and walk speed controls</li>
        <li>Direct-download release flow prepared for Sparkle updates</li>
      </ul>
      <p class="muted" style="margin-top: 20px;">
        Back to <a href="../index.html">TinyPaws home</a>
      </p>
    </section>
  </main>
</body>
</html>
