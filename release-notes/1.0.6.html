<body>
  <h1>TinyPaws 1.0.6</h1>
  <ul>
    <li>Added Command-drag repositioning for translucent pets that normally allow pointer events to pass through.</li>
    <li>Temporarily shows the pet at full opacity while Command-dragging, then restores the selected opacity and click-through behavior when released.</li>
  </ul>
