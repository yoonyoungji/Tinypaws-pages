<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TinyPaws Support</title>
  <meta name="description" content="Support page for TinyPaws, a macOS desktop companion app.">
  <style>
    :root {
      color-scheme: light;
      --bg: #f7efe4;
      --card: rgba(255, 252, 247, 0.92);
      --text: #2d241e;
      --muted: #6c5c50;
      --line: rgba(85, 61, 45, 0.14);
      --accent: #c96f4a;
      --accent-strong: #9e4c2d;
      --shadow: 0 18px 50px rgba(74, 44, 26, 0.12);
      --overlay: rgba(45, 36, 30, 0.42);
    }

    * { box-sizing: border-box; }

    html {
      visibility: hidden;
    }

    html.ready {
      visibility: visible;
    }

    body {
      margin: 0;
      font-family: "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 214, 170, 0.9), transparent 34%),
        radial-gradient(circle at top right, rgba(255, 191, 133, 0.5), transparent 28%),
        linear-gradient(180deg, #fff9f2 0%, var(--bg) 100%);
      line-height: 1.6;
    }

    .wrap {
      width: min(960px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0 64px;
    }

    .hero,
    .card,
    .language-sheet {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .hero {
      padding: 36px 32px;
      margin-bottom: 20px;
    }

    .hero-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .eyebrow {
      margin: 0;
      color: var(--accent-strong);
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h1, h2, h3, p { margin-top: 0; }

    h1 {
      font-size: clamp(2rem, 5vw, 3.4rem);
      line-height: 1.05;
      margin-bottom: 14px;
    }

    .lead {
      max-width: 42rem;
      font-size: 1.06rem;
      color: var(--muted);
      margin-bottom: 0;
    }

    .nav {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .nav a,
    .switcher button,
    .language-button {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(201, 111, 74, 0.12);
      color: var(--accent-strong);
      text-decoration: none;
      font-weight: 700;
      border: 1px solid transparent;
      font: inherit;
      cursor: pointer;
      transition: transform 140ms ease, background-color 140ms ease, border-color 140ms ease;
    }

    .nav a:hover,
    .switcher button:hover,
    .language-button:hover,
    .contact:hover {
      transform: translateY(-1px);
    }

    .switcher {
      display: inline-flex;
      gap: 8px;
      padding: 8px;
      background: rgba(255, 250, 244, 0.92);
      border: 1px solid var(--line);
      border-radius: 999px;
    }

    .switcher button {
      min-height: 38px;
      padding: 0 14px;
      background: var(--card);
      border-color: rgba(158, 76, 45, 0.18);
    }

    .switcher button.active,
    .language-button.primary {
      background: var(--accent);
      color: #fff9f5;
      border-color: transparent;
    }

    .language-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .language-button.secondary {
      background: var(--card);
      border-color: rgba(158, 76, 45, 0.18);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
    }

    .card {
      padding: 28px;
    }

    .card.full {
      grid-column: 1 / -1;
    }

    h2 {
      font-size: 1.3rem;
      margin-bottom: 12px;
    }

    h3 {
      font-size: 1rem;
      margin-bottom: 6px;
    }

    ul {
      margin: 0;
      padding-left: 18px;
    }

    li + li { margin-top: 8px; }

    a { color: var(--accent-strong); }

    .contact {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 999px;
      text-decoration: none;
      background: rgba(201, 111, 74, 0.12);
      color: var(--accent-strong);
      font-weight: 700;
      transition: transform 140ms ease;
    }

    .muted { color: var(--muted); }

    .faq-item + .faq-item {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    footer {
      padding-top: 18px;
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .language-modal[hidden] {
      display: none;
    }

    .language-modal {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 20px;
      background: var(--overlay);
      z-index: 20;
    }

    .language-sheet {
      width: min(100%, 460px);
      padding: 28px;
    }

    .language-sheet h2 {
      margin-bottom: 8px;
    }

    .language-sheet p {
      color: var(--muted);
      margin-bottom: 20px;
    }

    @media (max-width: 760px) {
      .wrap {
        width: min(100% - 20px, 960px);
        padding: 20px 0 32px;
      }

      .hero,
      .card,
      .language-sheet {
        border-radius: 20px;
      }

      .hero {
        padding: 28px 20px;
      }

      .card,
      .language-sheet {
        padding: 22px 20px;
      }

      .hero-top {
        flex-direction: column;
        align-items: stretch;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .language-actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="hero-top">
        <p class="eyebrow" data-i18n="eyebrow"></p>
        <div class="switcher" data-aria-label-key="switcherAriaLabel">
          <button type="button" data-set-language="ko" data-i18n="switchKorean"></button>
          <button type="button" data-set-language="en" data-i18n="switchEnglish"></button>
        </div>
      </div>
      <h1 data-i18n="heroTitle"></h1>
      <p class="lead" data-i18n="heroLead"></p>
      <nav class="nav" data-aria-label-key="navAriaLabel">
        <a href="./index.html" data-i18n="homeLink"></a>
        <a href="./privacy.html" data-i18n="privacyLink"></a>
      </nav>
    </section>

    <section class="grid">
      <article class="card">
        <h2 data-i18n="contactTitle"></h2>
        <p data-i18n="supportEmailLabel"></p>
        <p>
          <a class="contact" href="mailto:dbsdudwl94@gmail.com">dbsdudwl94@gmail.com</a>
        </p>
        <p class="muted" data-i18n="developerLabel"></p>
        <p class="muted" data-i18n="responseTime"></p>
      </article>

      <article class="card">
        <h2 data-i18n="overviewTitle"></h2>
        <ul>
          <li data-i18n="overviewItem1"></li>
          <li data-i18n="overviewItem2"></li>
          <li data-i18n="overviewItem3"></li>
          <li data-i18n="overviewItem4"></li>
        </ul>
      </article>

      <article class="card">
        <h2 data-i18n="permissionsTitle"></h2>
        <p class="muted" data-i18n="permissionsBody1"></p>
        <p class="muted" data-i18n="permissionsBody2"></p>
      </article>

      <article class="card">
        <h2 data-i18n="compatibilityTitle"></h2>
        <ul>
          <li data-i18n="compatibilityItem1"></li>
          <li data-i18n="compatibilityItem2"></li>
          <li data-i18n="compatibilityItem3"></li>
        </ul>
      </article>

      <article class="card full">
        <h2 data-i18n="faqTitle"></h2>

        <div class="faq-item">
          <h3 data-i18n="faq1Title"></h3>
          <p class="muted" data-i18n="faq1Body"></p>
        </div>

        <div class="faq-item">
          <h3 data-i18n="faq2Title"></h3>
          <p class="muted" data-i18n="faq2Body"></p>
        </div>

        <div class="faq-item">
          <h3 data-i18n="faq3Title"></h3>
          <p class="muted" data-i18n="faq3Body"></p>
        </div>

        <div class="faq-item">
          <h3 data-i18n="faq4Title"></h3>
          <p class="muted" data-i18n="faq4Body"></p>
        </div>
      </article>
    </section>

    <footer data-i18n="footerText"></footer>
  </main>

  <div class="language-modal" id="languageModal" hidden>
    <div class="language-sheet" role="dialog" aria-modal="true" aria-labelledby="languageModalTitle">
      <h2 id="languageModalTitle" data-i18n="modalTitle"></h2>
      <p data-i18n="modalBody"></p>
      <div class="language-actions">
        <button type="button" class="language-button primary" data-set-language="ko" data-i18n="modalKorean"></button>
        <button type="button" class="language-button secondary" data-set-language="en" data-i18n="modalEnglish"></button>
      </div>
    </div>
  </div>

  <script>
    const storageKey = "tinypaws-language";
    const translations = {
      en: {
        pageTitle: "TinyPaws Support",
        metaDescription: "Support page for TinyPaws, a macOS desktop companion app.",
        eyebrow: "TinyPaws Support",
        heroTitle: "Your tiny Mac companion, with help when you need it.",
        heroLead: "TinyPaws is a lightweight macOS desktop companion app that adds a small animated pet to your screen. If you need help, have a question, or want to report a bug, please use the support contact below.",
        homeLink: "Home",
        privacyLink: "Privacy Policy",
        contactTitle: "Contact",
        supportEmailLabel: "Support email",
        developerLabel: "Developer: youngji Yoon",
        responseTime: "Typical response time: within 3 business days",
        overviewTitle: "App Overview",
        overviewItem1: "Animated desktop pet for macOS",
        overviewItem2: "Character selection and size adjustment",
        overviewItem3: "Transparency controls for different workspaces",
        overviewItem4: "Drag to reposition on the desktop",
        permissionsTitle: "Permissions",
        permissionsBody1: "TinyPaws may guide you to macOS Accessibility or Input Monitoring settings so the character can react to keyboard input while other apps are active.",
        permissionsBody2: "The app is still usable without these permissions, but some keyboard-reactive behavior may be limited.",
        compatibilityTitle: "Compatibility",
        compatibilityItem1: "Platform: macOS",
        compatibilityItem2: "Minimum version: macOS 13.0 or later",
        compatibilityItem3: "App type: menu bar desktop companion",
        faqTitle: "FAQ",
        faq1Title: "The character is not responding to keyboard input.",
        faq1Body: "Check whether Accessibility or Input Monitoring permission has been granted in macOS System Settings.",
        faq2Title: "The character is covering part of my screen.",
        faq2Body: "Drag the character to another position, or adjust the size and transparency from the menu bar controls.",
        faq3Title: "I want to report a bug or request a feature.",
        faq3Body: "Send your macOS version, the TinyPaws version, and a short description of the issue to the support email.",
        faq4Title: "Can I send questions in Korean?",
        faq4Body: "Yes. Korean support is available. If you include your macOS version, TinyPaws version, and reproduction steps, it will help us review the issue faster.",
        footerText: "TinyPaws Support Page",
        switcherAriaLabel: "Language switcher",
        navAriaLabel: "Page links",
        switchKorean: "Korean",
        switchEnglish: "English",
        modalTitle: "Choose your language",
        modalBody: "Pick the language you want to use on the TinyPaws site. You can change it again anytime from the top-right button.",
        modalKorean: "한국어로 보기",
        modalEnglish: "Continue in English"
      },
      ko: {
        pageTitle: "TinyPaws 지원",
        metaDescription: "TinyPaws macOS 데스크톱 컴패니언 앱 지원 페이지입니다.",
        eyebrow: "TinyPaws 지원",
        heroTitle: "작은 Mac 친구, 필요할 때 바로 도움받을 수 있게.",
        heroLead: "TinyPaws는 화면 위에 작은 애니메이션 펫을 띄워주는 가벼운 macOS 데스크톱 컴패니언 앱입니다. 도움이 필요하거나, 문의가 있거나, 버그를 제보하고 싶다면 아래 지원 연락처로 보내 주세요.",
        homeLink: "홈",
        privacyLink: "개인정보처리방침",
        contactTitle: "문의",
        supportEmailLabel: "지원 이메일",
        developerLabel: "개발자: youngji Yoon",
        responseTime: "보통 3영업일 이내에 답변드립니다.",
        overviewTitle: "앱 소개",
        overviewItem1: "macOS용 애니메이션 데스크톱 펫",
        overviewItem2: "캐릭터 선택 및 크기 조절",
        overviewItem3: "작업 환경에 맞춘 투명도 조절",
        overviewItem4: "드래그해서 바탕화면 위치 이동",
        permissionsTitle: "권한 안내",
        permissionsBody1: "TinyPaws는 다른 앱이 활성화되어 있을 때도 캐릭터가 키보드 입력에 반응할 수 있도록 macOS 손쉬운 사용 또는 입력 모니터링 설정을 안내할 수 있습니다.",
        permissionsBody2: "이 권한 없이도 앱은 사용할 수 있지만, 일부 키보드 반응 기능은 제한될 수 있습니다.",
        compatibilityTitle: "호환성",
        compatibilityItem1: "플랫폼: macOS",
        compatibilityItem2: "최소 지원 버전: macOS 13.0 이상",
        compatibilityItem3: "앱 유형: 메뉴 막대 데스크톱 컴패니언",
        faqTitle: "자주 묻는 질문",
        faq1Title: "캐릭터가 키보드 입력에 반응하지 않아요.",
        faq1Body: "macOS 시스템 설정에서 손쉬운 사용 또는 입력 모니터링 권한이 허용되어 있는지 확인해 주세요.",
        faq2Title: "캐릭터가 화면 일부를 가려요.",
        faq2Body: "캐릭터를 다른 위치로 드래그하거나, 메뉴 막대 설정에서 크기와 투명도를 조절해 주세요.",
        faq3Title: "버그 제보나 기능 요청을 하고 싶어요.",
        faq3Body: "사용 중인 macOS 버전, TinyPaws 버전, 문제 설명을 함께 지원 이메일로 보내 주시면 확인에 도움이 됩니다.",
        faq4Title: "한국어로 문의해도 되나요?",
        faq4Body: "네. 한국어 문의가 가능합니다. macOS 버전, TinyPaws 버전, 재현 방법을 함께 보내 주시면 더 빠르게 검토할 수 있습니다.",
        footerText: "TinyPaws 지원 페이지",
        switcherAriaLabel: "언어 전환",
        navAriaLabel: "페이지 링크",
        switchKorean: "한국어",
        switchEnglish: "영문",
        modalTitle: "사용할 언어를 선택해 주세요",
        modalBody: "TinyPaws 사이트에서 사용할 언어를 선택해 주세요. 오른쪽 위 버튼에서 언제든 다시 바꿀 수 있습니다.",
        modalKorean: "한국어로 시작하기",
        modalEnglish: "영문으로 보기"
      }
    };

    const elements = document.querySelectorAll("[data-i18n]");
    const switchButtons = document.querySelectorAll("[data-set-language]");
    const ariaLabelElements = document.querySelectorAll("[data-aria-label-key]");
    const modal = document.getElementById("languageModal");
    const descriptionMeta = document.querySelector('meta[name="description"]');

    function applyLanguage(language) {
      const lang = translations[language] ? language : "en";
      const copy = translations[lang];

      elements.forEach((element) => {
        const key = element.dataset.i18n;
        element.textContent = copy[key];
      });

      ariaLabelElements.forEach((element) => {
        const key = element.dataset.ariaLabelKey;
        element.setAttribute("aria-label", copy[key]);
      });

      document.documentElement.lang = lang;
      document.title = copy.pageTitle;
      descriptionMeta.setAttribute("content", copy.metaDescription);
      document.documentElement.dataset.language = lang;

      switchButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.setLanguage === lang);
      });
    }

    function chooseLanguage(language) {
      localStorage.setItem(storageKey, language);
      applyLanguage(language);
      modal.hidden = true;
    }

    switchButtons.forEach((button) => {
      button.addEventListener("click", () => chooseLanguage(button.dataset.setLanguage));
    });

    const storedLanguage = localStorage.getItem(storageKey);

    if (storedLanguage) {
      applyLanguage(storedLanguage);
    } else {
      applyLanguage("ko");
      modal.hidden = false;
    }

    document.documentElement.classList.add("ready");
  </script>
</body>
</html>
