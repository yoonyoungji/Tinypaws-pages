<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TinyPaws Support</title>
  <meta name="description" content="Support page for TinyPaws, a macOS desktop companion app.">
  <style>
    :root {
      color-scheme: light;
      --bg: #f7efe4;
      --card: rgba(255, 252, 247, 0.92);
      --text: #2d241e;
      --muted: #6c5c50;
      --line: rgba(85, 61, 45, 0.14);
      --accent: #c96f4a;
      --accent-strong: #9e4c2d;
      --shadow: 0 18px 50px rgba(74, 44, 26, 0.12);
      --overlay: rgba(45, 36, 30, 0.42);
    }

    * { box-sizing: border-box; }

    html {
      visibility: hidden;
    }

    html.ready {
      visibility: visible;
    }

    body {
      margin: 0;
      font-family: "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 214, 170, 0.9), transparent 34%),
        radial-gradient(circle at top right, rgba(255, 191, 133, 0.5), transparent 28%),
        linear-gradient(180deg, #fff9f2 0%, var(--bg) 100%);
      line-height: 1.6;
    }

    .wrap {
      width: min(960px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0 64px;
    }

    .hero,
    .card,
    .language-sheet {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .hero {
      padding: 36px 32px;
      margin-bottom: 20px;
    }

    .hero-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .eyebrow {
      margin: 0;
      color: var(--accent-strong);
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h1, h2, h3, p { margin-top: 0; }

    h1 {
      font-size: clamp(2rem, 5vw, 3.4rem);
      line-height: 1.05;
      margin-bottom: 14px;
    }

    .lead {
      max-width: 42rem;
      font-size: 1.06rem;
      color: var(--muted);
      margin-bottom: 0;
    }

    .nav {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .nav a,
    .switcher button,
    .language-button {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(201, 111, 74, 0.12);
      color: var(--accent-strong);
      text-decoration: none;
      font-weight: 700;
      border: 1px solid transparent;
      font: inherit;
      cursor: pointer;
      transition: transform 140ms ease, background-color 140ms ease, border-color 140ms ease;
    }

    .nav a:hover,
    .switcher button:hover,
    .language-button:hover,
    .contact:hover {
      transform: translateY(-1px);
    }

    .switcher {
      display: inline-flex;
      gap: 8px;
      padding: 8px;
      background: rgba(255, 250, 244, 0.92);
      border: 1px solid var(--line);
      border-radius: 999px;
    }

    .switcher button {
      min-height: 38px;
      padding: 0 14px;
      background: var(--card);
      border-color: rgba(158, 76, 45, 0.18);
    }

    .switcher button.active,
    .language-button.primary {
      background: var(--accent);
      color: #fff9f5;
      border-color: transparent;
    }

    .language-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .language-button.secondary {
      background: var(--card);
      border-color: rgba(158, 76, 45, 0.18);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
    }

    .card {
      padding: 28px;
    }

    .card.full {
      grid-column: 1 / -1;
    }

    h2 {
      font-size: 1.3rem;
      margin-bottom: 12px;
    }

    h3 {
      font-size: 1rem;
      margin-bottom: 6px;
    }

    ul, ol {
      margin: 0;
      padding-left: 18px;
    }

    li + li { margin-top: 8px; }

    a { color: var(--accent-strong); }

    .contact {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 999px;
      text-decoration: none;
      background: rgba(201, 111, 74, 0.12);
      color: var(--accent-strong);
      font-weight: 700;
      transition: transform 140ms ease;
    }

    .muted { color: var(--muted); }

    .faq-item + .faq-item {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .guide-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .guide-step {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255, 249, 242, 0.82);
    }

    .step-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 34px;
      height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff9f5;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .mock-shot {
      border: 1px solid rgba(158, 76, 45, 0.14);
      border-radius: 18px;
      background: linear-gradient(180deg, #fffdf9 0%, #f7efe5 100%);
      overflow: hidden;
      box-shadow: 0 12px 28px rgba(74, 44, 26, 0.08);
      margin-top: 14px;
    }

    .mock-shot-bar {
      height: 34px;
      background: rgba(210, 190, 172, 0.35);
      border-bottom: 1px solid rgba(158, 76, 45, 0.12);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 8px;
    }

    .mock-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: rgba(158, 76, 45, 0.28);
    }

    .mock-shot-body {
      padding: 16px;
      display: grid;
      gap: 10px;
    }

    .mock-label {
      font-size: 0.88rem;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .mock-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(158, 76, 45, 0.1);
    }

    .mock-row.active {
      background: rgba(201, 111, 74, 0.12);
      border-color: rgba(201, 111, 74, 0.22);
    }

    .toggle {
      width: 42px;
      height: 24px;
      border-radius: 999px;
      background: rgba(158, 76, 45, 0.18);
      position: relative;
      flex: none;
    }

    .toggle::after {
      content: "";
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      border-radius: 999px;
      background: white;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
    }

    .toggle.on {
      background: rgba(76, 175, 80, 0.78);
    }

    .toggle.on::after {
      left: 21px;
    }

    footer {
      padding-top: 18px;
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .language-modal[hidden] {
      display: none;
    }

    .language-modal {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 20px;
      background: var(--overlay);
      z-index: 20;
    }

    .language-sheet {
      width: min(100%, 460px);
      padding: 28px;
    }

    .language-sheet h2 {
      margin-bottom: 8px;
    }

    .language-sheet p {
      color: var(--muted);
      margin-bottom: 20px;
    }

    @media (max-width: 760px) {
      .wrap {
        width: min(100% - 20px, 960px);
        padding: 20px 0 32px;
      }

      .hero,
      .card,
      .language-sheet {
        border-radius: 20px;
      }

      .hero {
        padding: 28px 20px;
      }

      .card,
      .language-sheet {
        padding: 22px 20px;
      }

      .hero-top {
        flex-direction: column;
        align-items: stretch;
      }

      .grid,
      .guide-grid {
        grid-template-columns: 1fr;
      }

      .language-actions {
        flex-direction: column;
      }
    }
  </style>
</head>

    const elements = document.querySelectorAll("[data-i18n]");
    const switchButtons = document.querySelectorAll("[data-set-language]");
    const ariaLabelElements = document.querySelectorAll("[data-aria-label-key]");
    const modal = document.getElementById("languageModal");
    const descriptionMeta = document.querySelector('meta[name="description"]');

    function applyLanguage(language) {
      const lang = translations[language] ? language : "en";
      const copy = translations[lang];

      elements.forEach((element) => {
        const key = element.dataset.i18n;
        element.textContent = copy[key];
      });

      ariaLabelElements.forEach((element) => {
        const key = element.dataset.ariaLabelKey;
        element.setAttribute("aria-label", copy[key]);
      });

      document.documentElement.lang = lang;
      document.title = copy.pageTitle;
      descriptionMeta.setAttribute("content", copy.metaDescription);
      document.documentElement.dataset.language = lang;

      switchButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.setLanguage === lang);
      });
    }

    function chooseLanguage(language) {
      localStorage.setItem(storageKey, language);
      applyLanguage(language);
      modal.hidden = true;
    }

    switchButtons.forEach((button) => {
      button.addEventListener("click", () => chooseLanguage(button.dataset.setLanguage));
    });

    const storedLanguage = localStorage.getItem(storageKey);

    if (storedLanguage) {
      applyLanguage(storedLanguage);
    } else {
      applyLanguage("ko");
      modal.hidden = false;
    }

    document.documentElement.classList.add("ready");
  </script>
