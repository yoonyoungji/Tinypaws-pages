<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TinyPaws</title>
  <meta name="description" content="TinyPaws direct download, release notes, and support pages for the macOS desktop companion app.">
  <style>
    :root {
      color-scheme: light;
      --bg: #f8f1e7;
      --surface: rgba(255, 252, 247, 0.94);
      --surface-strong: #fffaf4;
      --text: #2d241e;
      --muted: #6f5d50;
      --line: rgba(94, 67, 49, 0.14);
      --accent: #bf6b46;
      --accent-strong: #8f4227;
      --shadow: 0 20px 50px rgba(74, 44, 26, 0.12);
      --overlay: rgba(45, 36, 30, 0.42);
    }

    * { box-sizing: border-box; }

    html {
      visibility: hidden;
    }

    html.ready {
      visibility: visible;
    }

    body {
      margin: 0;
      font-family: "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 219, 179, 0.9), transparent 34%),
        radial-gradient(circle at top right, rgba(255, 193, 143, 0.42), transparent 28%),
        linear-gradient(180deg, #fffaf4 0%, var(--bg) 100%);
      line-height: 1.6;
    }

    a { color: var(--accent-strong); }

    .wrap {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 44px 0 64px;
    }

    .hero,
    .card,
    .language-sheet {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .hero {
      padding: 38px 34px;
      margin-bottom: 20px;
    }

    .hero-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .eyebrow {
      margin: 0;
      color: var(--accent-strong);
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    h1, h2, h3, p { margin-top: 0; }

    h1 {
      font-size: clamp(2.2rem, 5vw, 4rem);
      line-height: 1.03;
      margin-bottom: 14px;
      max-width: 12ch;
    }

    h2 {
      font-size: 1.35rem;
      margin-bottom: 10px;
    }

    .lead {
      max-width: 46rem;
      color: var(--muted);
      font-size: 1.08rem;
      margin-bottom: 0;
    }

    .actions,
    .language-switcher,
    .language-actions,
    .cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .actions {
      margin-top: 22px;
    }

    .btn,
    .language-button,
    .switcher button,
    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      border: 1px solid transparent;
      font: inherit;
      cursor: pointer;
      transition: transform 140ms ease, background-color 140ms ease, border-color 140ms ease;
    }

    .btn:hover,
    .language-button:hover,
    .switcher button:hover,
    .pill:hover {
      transform: translateY(-1px);
    }

    .btn.primary,
    .language-button.primary {
      background: var(--accent);
      color: #fff9f5;
    }

    .btn.secondary,
    .language-button.secondary,
    .switcher button,
    .pill {
      background: var(--surface-strong);
      color: var(--accent-strong);
      border-color: rgba(143, 66, 39, 0.2);
    }

    .switcher {
      display: inline-flex;
      gap: 8px;
      padding: 8px;
      background: rgba(255, 250, 244, 0.92);
      border: 1px solid var(--line);
      border-radius: 999px;
    }

    .switcher button {
      min-height: 38px;
      padding: 0 14px;
    }

    .switcher button.active {
      background: var(--accent);
      color: #fff9f5;
      border-color: transparent;
    }

    .hero-meta {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-top: 24px;
    }

    .meta-block {
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255, 250, 244, 0.82);
    }

    .meta-label {
      display: block;
      font-size: 0.84rem;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .meta-value {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
    }

    .card {
      padding: 28px;
    }

    .card.full {
      grid-column: 1 / -1;
    }

    ul {
      margin: 0;
      padding-left: 18px;
    }

    li + li {
      margin-top: 8px;
    }

    .muted { color: var(--muted); }

    .inline-note {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .page-links {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 14px;
    }

    .page-link {
      display: block;
      padding: 18px;
      background: var(--surface-strong);
      border: 1px solid var(--line);
      border-radius: 20px;
      text-decoration: none;
      color: inherit;
    }

    .page-link strong {
      display: block;
      margin-bottom: 6px;
      color: var(--accent-strong);
    }

    code {
      font-family: "SFMono-Regular", "SF Mono", ui-monospace, monospace;
      font-size: 0.92em;
      background: rgba(143, 66, 39, 0.08);
      padding: 2px 6px;
      border-radius: 8px;
    }

    footer {
      padding-top: 18px;
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .language-modal[hidden] {
      display: none;
    }

    .language-modal {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 20px;
      background: var(--overlay);
      z-index: 20;
    }

    .language-sheet {
      width: min(100%, 460px);
      padding: 28px;
    }

    .language-sheet h2 {
      margin-bottom: 8px;
    }

    .language-sheet p {
      color: var(--muted);
      margin-bottom: 20px;
    }

    @media (max-width: 860px) {
      .hero-meta {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 760px) {
      .wrap {
        width: min(100% - 20px, 1080px);
        padding: 20px 0 32px;
      }

      .hero,
      .card,
      .language-sheet {
        border-radius: 22px;
      }

      .hero {
        padding: 28px 20px;
      }

      .card,
      .language-sheet {
        padding: 22px 20px;
      }

      .hero-top {
        flex-direction: column;
        align-items: stretch;
      }

      .grid,
      .page-links,
      .hero-meta {
        grid-template-columns: 1fr;
      }

      .language-actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="hero-top">
        <p class="eyebrow">TinyPaws</p>
        <div class="switcher language-switcher" data-aria-label-key="switcherAriaLabel">
          <button type="button" data-set-language="ko" data-i18n="switchKorean"></button>
          <button type="button" data-set-language="en" data-i18n="switchEnglish"></button>
        </div>
      </div>
      <h1 data-i18n="heroTitle"></h1>
      <p class="lead" data-i18n="heroLead"></p>
      <div class="actions">
        <a class="btn primary" href="./downloads/TinyPaws.dmg" data-i18n="downloadButton"></a>
        <a class="btn secondary" href="./release-notes/1.0.html" data-i18n="releaseNotesButton"></a>
        <a class="btn secondary" href="./support.html" data-i18n="supportButton"></a>
        <a class="btn secondary" href="./privacy.html" data-i18n="privacyButton"></a>
      </div>
      <div class="hero-meta">
        <div class="meta-block">
          <span class="meta-label" data-i18n="metaVersionLabel"></span>
          <span class="meta-value" data-i18n="metaVersionValue"></span>
        </div>
        <div class="meta-block">
          <span class="meta-label" data-i18n="metaPlatformLabel"></span>
          <span class="meta-value" data-i18n="metaPlatformValue"></span>
        </div>
        <div class="meta-block">
          <span class="meta-label" data-i18n="metaUpdatesLabel"></span>
          <span class="meta-value" data-i18n="metaUpdatesValue"></span>
        </div>
        <div class="meta-block">
          <span class="meta-label" data-i18n="metaFeedLabel"></span>
          <span class="meta-value"><code>appcast.xml</code></span>
        </div>
      </div>
    </section>

    <section class="grid">
      <article class="card">
        <h2 data-i18n="downloadTitle"></h2>
        <p class="muted" data-i18n="downloadBody"></p>
        <div class="cta-row">
          <a class="pill" href="./downloads/TinyPaws.dmg" data-i18n="downloadPrimary"></a>
          <a class="pill" href="./appcast.xml" data-i18n="downloadSecondary"></a>
        </div>
        <p class="inline-note" data-i18n="downloadNote"></p>
      </article>

      <article class="card">
        <h2 data-i18n="aboutTitle"></h2>
        <ul>
          <li data-i18n="aboutItem1"></li>
          <li data-i18n="aboutItem2"></li>
          <li data-i18n="aboutItem3"></li>
          <li data-i18n="aboutItem4"></li>
        </ul>
      </article>

      <article class="card">
        <h2 data-i18n="updatesTitle"></h2>
        <ul>
          <li data-i18n="updatesItem1"></li>
          <li data-i18n="updatesItem2"></li>
          <li data-i18n="updatesItem3"></li>
        </ul>
      </article>

      <article class="card">
        <h2 data-i18n="contactTitle"></h2>
        <p class="muted" data-i18n="developerLabel"></p>
        <p><a href="mailto:dbsdudwl94@gmail.com">dbsdudwl94@gmail.com</a></p>
        <p class="muted" data-i18n="responseTime"></p>
      </article>

      <article class="card full">
        <h2 data-i18n="pagesTitle"></h2>
        <div class="page-links">
          <a class="page-link" href="./support.html">
            <strong data-i18n="supportCardTitle"></strong>
            <span data-i18n="supportCardBody"></span>
          </a>
          <a class="page-link" href="./privacy.html">
            <strong data-i18n="privacyCardTitle"></strong>
            <span data-i18n="privacyCardBody"></span>
          </a>
          <a class="page-link" href="./release-notes/1.0.html">
            <strong data-i18n="releaseCardTitle"></strong>
            <span data-i18n="releaseCardBody"></span>
          </a>
          <a class="page-link" href="./appcast.xml">
            <strong data-i18n="appcastCardTitle"></strong>
            <span data-i18n="appcastCardBody"></span>
          </a>
        </div>
      </article>
    </section>

    <footer data-i18n="footerText"></footer>
  </main>

  <div class="language-modal" id="languageModal" hidden>
    <div class="language-sheet" role="dialog" aria-modal="true" aria-labelledby="languageModalTitle">
      <h2 id="languageModalTitle" data-i18n="modalTitle"></h2>
      <p data-i18n="modalBody"></p>
      <div class="language-actions">
        <button type="button" class="language-button primary" data-set-language="ko" data-i18n="modalKorean"></button>
        <button type="button" class="language-button secondary" data-set-language="en" data-i18n="modalEnglish"></button>
      </div>
    </div>
  </div>

  <script>
    const storageKey = "tinypaws-language";
    const translations = {
      en: {
        pageTitle: "TinyPaws",
        metaDescription: "TinyPaws direct download, release notes, and support pages for the macOS desktop companion app.",
        heroTitle: "A tiny desktop companion for your Mac.",
        heroLead: "Download TinyPaws directly for macOS, read release notes, and get future updates through Sparkle-powered in-app updates.",
        downloadButton: "Download for macOS",
        releaseNotesButton: "Release Notes",
        supportButton: "Support",
        privacyButton: "Privacy",
        metaVersionLabel: "Latest Version",
        metaVersionValue: "1.0",
        metaPlatformLabel: "Platform",
        metaPlatformValue: "macOS 13.0+",
        metaUpdatesLabel: "Updates",
        metaUpdatesValue: "Automatic via Sparkle",
        metaFeedLabel: "Update Feed",
        downloadTitle: "Direct Download",
        downloadBody: "TinyPaws is distributed outside the Mac App Store. Download the DMG, move TinyPaws into Applications, and keep future versions up to date from inside the app.",
        downloadPrimary: "Download DMG",
        downloadSecondary: "Open appcast.xml",
        downloadNote: "Before launch, upload your signed and notarized release archive to ./downloads/TinyPaws.dmg.",
        aboutTitle: "About TinyPaws",
        aboutItem1: "Animated desktop pet for macOS",
        aboutItem2: "Character, size, opacity, and walk speed controls",
        aboutItem3: "Drag to reposition on your desktop",
        aboutItem4: "Menu bar companion with direct-download distribution",
        updatesTitle: "How Updates Work",
        updatesItem1: "The direct-download build checks for updates with Sparkle.",
        updatesItem2: "Each release is signed, notarized, and published with release notes.",
        updatesItem3: "The appcast feed is hosted on this site for in-app update delivery.",
        contactTitle: "Contact",
        developerLabel: "Developer: youngji Yoon",
        responseTime: "Typical response time: within 3 business days",
        pagesTitle: "Pages & Files",
        supportCardTitle: "Support",
        supportCardBody: "Help, FAQs, compatibility, and contact details for TinyPaws users.",
        privacyCardTitle: "Privacy Policy",
        privacyCardBody: "What TinyPaws stores locally, how permissions are used, and what data is not collected.",
        releaseCardTitle: "Release Notes",
        releaseCardBody: "Version history and major changes for direct-download builds.",
        appcastCardTitle: "Appcast Feed",
        appcastCardBody: "Sparkle update feed used by the app for automatic update checks.",
        footerText: "TinyPaws official direct download, release notes, and support information",
        switcherAriaLabel: "Language switcher",
        switchKorean: "Korean",
        switchEnglish: "English",
        modalTitle: "Choose your language",
        modalBody: "Pick the language you want to use on the TinyPaws site. You can change it again anytime from the top-right button.",
        modalKorean: "한국어로 보기",
        modalEnglish: "Continue in English"
      },
      ko: {
        pageTitle: "TinyPaws",
        metaDescription: "TinyPaws macOS 데스크톱 컴패니언 앱의 직접 다운로드, 릴리스 노트, 지원 페이지입니다.",
        heroTitle: "Mac 위에 함께 머무는 작은 데스크톱 친구.",
        heroLead: "TinyPaws를 macOS용으로 직접 다운로드하고, 릴리스 노트를 확인하고, Sparkle 기반 앱 내 업데이트를 통해 다음 버전도 받아보세요.",
        downloadButton: "macOS용 다운로드",
        releaseNotesButton: "릴리스 노트",
        supportButton: "지원",
        privacyButton: "개인정보",
        metaVersionLabel: "최신 버전",
        metaVersionValue: "1.0",
        metaPlatformLabel: "지원 환경",
        metaPlatformValue: "macOS 13.0+",
        metaUpdatesLabel: "업데이트",
        metaUpdatesValue: "Sparkle 자동 업데이트",
        metaFeedLabel: "업데이트 피드",
        downloadTitle: "직접 다운로드",
        downloadBody: "TinyPaws는 Mac App Store 밖에서 배포됩니다. DMG를 내려받아 Applications로 옮겨 설치하고, 이후 버전은 앱 안에서 업데이트할 수 있습니다.",
        downloadPrimary: "DMG 다운로드",
        downloadSecondary: "appcast.xml 열기",
        downloadNote: "출시 전에 서명 및 notarization이 끝난 파일을 ./downloads/TinyPaws.dmg 경로에 업로드해 주세요.",
        aboutTitle: "TinyPaws 소개",
        aboutItem1: "macOS용 애니메이션 데스크톱 펫",
        aboutItem2: "캐릭터, 크기, 투명도, 이동 속도 조절",
        aboutItem3: "드래그해서 원하는 위치로 이동",
        aboutItem4: "직접 배포 방식에 맞춘 메뉴 막대 컴패니언",
        updatesTitle: "업데이트 방식",
        updatesItem1: "직접 다운로드 빌드는 Sparkle로 업데이트를 확인합니다.",
        updatesItem2: "각 릴리스는 서명, notarization, 릴리스 노트와 함께 배포됩니다.",
        updatesItem3: "앱 내 업데이트를 위해 appcast 피드를 이 사이트에서 제공합니다.",
        contactTitle: "문의",
        developerLabel: "개발자: youngji Yoon",
        responseTime: "보통 3영업일 이내에 답변드립니다.",
        pagesTitle: "페이지 및 파일",
        supportCardTitle: "지원",
        supportCardBody: "TinyPaws 사용자용 도움말, 자주 묻는 질문, 호환성, 연락처를 확인할 수 있습니다.",
        privacyCardTitle: "개인정보처리방침",
        privacyCardBody: "TinyPaws가 기기에 저장하는 정보, 권한 사용 방식, 수집하지 않는 데이터를 안내합니다.",
        releaseCardTitle: "릴리스 노트",
        releaseCardBody: "직접 다운로드 버전의 변경 내역과 주요 업데이트를 확인할 수 있습니다.",
        appcastCardTitle: "Appcast 피드",
        appcastCardBody: "앱이 자동 업데이트를 확인할 때 사용하는 Sparkle 피드입니다.",
        footerText: "TinyPaws 공식 다운로드, 릴리스 노트, 지원 안내",
        switcherAriaLabel: "언어 전환",
        switchKorean: "한국어",
        switchEnglish: "영문",
        modalTitle: "사용할 언어를 선택해 주세요",
        modalBody: "TinyPaws 사이트에서 사용할 언어를 선택해 주세요. 오른쪽 위 버튼에서 언제든 다시 바꿀 수 있습니다.",
        modalKorean: "한국어로 시작하기",
        modalEnglish: "영문으로 보기"
      }
    };

    const elements = document.querySelectorAll("[data-i18n]");
    const switchButtons = document.querySelectorAll("[data-set-language]");
    const ariaLabelElements = document.querySelectorAll("[data-aria-label-key]");
    const modal = document.getElementById("languageModal");
    const descriptionMeta = document.querySelector('meta[name="description"]');

    function applyLanguage(language) {
      const lang = translations[language] ? language : "en";
      const copy = translations[lang];

      elements.forEach((element) => {
        const key = element.dataset.i18n;
        element.textContent = copy[key];
      });

      ariaLabelElements.forEach((element) => {
        const key = element.dataset.ariaLabelKey;
        element.setAttribute("aria-label", copy[key]);
      });

      document.documentElement.lang = lang;
      document.title = copy.pageTitle;
      descriptionMeta.setAttribute("content", copy.metaDescription);
      document.documentElement.dataset.language = lang;

      switchButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.setLanguage === lang);
      });
    }

    function chooseLanguage(language) {
      localStorage.setItem(storageKey, language);
      applyLanguage(language);
      modal.hidden = true;
    }

    switchButtons.forEach((button) => {
      button.addEventListener("click", () => chooseLanguage(button.dataset.setLanguage));
    });

    const storedLanguage = localStorage.getItem(storageKey);

    if (storedLanguage) {
      applyLanguage(storedLanguage);
    } else {
      applyLanguage("ko");
      modal.hidden = false;
    }

    document.documentElement.classList.add("ready");
  </script>
</body>
</html>
