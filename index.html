<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TinyPaws</title>
  <meta name="description" content="TinyPaws direct download, release notes, and support pages for the macOS desktop companion app.">
  <style>
    :root {
      color-scheme: light;
      --bg: #f8f1e7;
      --surface: rgba(255, 252, 247, 0.94);
      --surface-strong: #fffaf4;
      --text: #2d241e;
      --muted: #6f5d50;
      --line: rgba(94, 67, 49, 0.14);
      --accent: #bf6b46;
      --accent-strong: #8f4227;
      --shadow: 0 20px 50px rgba(74, 44, 26, 0.12);
      --overlay: rgba(45, 36, 30, 0.42);
    }

    * { box-sizing: border-box; }

    html {
      visibility: hidden;
    }

    html.ready {
      visibility: visible;
    }

    body {
      margin: 0;
      font-family: "SF Pro Text", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 219, 179, 0.9), transparent 34%),
        radial-gradient(circle at top right, rgba(255, 193, 143, 0.42), transparent 28%),
        linear-gradient(180deg, #fffaf4 0%, var(--bg) 100%);
      line-height: 1.6;
    }

    a { color: var(--accent-strong); }

    .wrap {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 44px 0 64px;
    }

    .hero,
    .card,
    .language-sheet,
    .support-sheet {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .hero {
      padding: 38px 34px;
      margin-bottom: 20px;
    }

    .hero-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(320px, 0.85fr);
      gap: 24px;
      align-items: center;
    }

    .hero-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .eyebrow {
      margin: 0;
      color: var(--accent-strong);
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    h1, h2, h3, p { margin-top: 0; }

    h1 {
      font-size: clamp(2.2rem, 5vw, 4rem);
      line-height: 1.03;
      margin-bottom: 14px;
      max-width: 12ch;
    }

    h2 {
      font-size: 1.35rem;
      margin-bottom: 10px;
    }

    .lead {
      max-width: 46rem;
      color: var(--muted);
      font-size: 1.08rem;
      margin-bottom: 0;
    }

    .actions,
    .language-switcher,
    .language-actions,
    .cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .actions {
      margin-top: 22px;
    }

    .btn,
    .language-button,
    .switcher button,
    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      border: 1px solid transparent;
      font: inherit;
      cursor: pointer;
      transition: transform 140ms ease, background-color 140ms ease, border-color 140ms ease;
    }

    .btn:hover,
    .language-button:hover,
    .switcher button:hover,
    .pill:hover {
      transform: translateY(-1px);
    }

    .btn.primary,
    .language-button.primary {
      background: var(--accent);
      color: #fff9f5;
    }

    .btn.secondary,
    .language-button.secondary,
    .switcher button,
    .pill {
      background: var(--surface-strong);
      color: var(--accent-strong);
      border-color: rgba(143, 66, 39, 0.2);
    }

    .switcher {
      display: inline-flex;
      gap: 8px;
      padding: 8px;
      background: rgba(255, 250, 244, 0.92);
      border: 1px solid var(--line);
      border-radius: 999px;
    }

    .switcher button {
      min-height: 38px;
      padding: 0 14px;
    }

    .switcher button.active {
      background: var(--accent);
      color: #fff9f5;
      border-color: transparent;
    }

    .hero-meta {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-top: 24px;
    }

    .meta-block {
      padding: 16px 18px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(255, 250, 244, 0.82);
    }

    .meta-label {
      display: block;
      font-size: 0.84rem;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .meta-value {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }

    .hero-art {
      position: relative;
      min-height: 360px;
      border-radius: 28px;
      background:
        radial-gradient(circle at top left, rgba(255, 225, 199, 0.95), transparent 45%),
        radial-gradient(circle at bottom right, rgba(255, 207, 158, 0.9), transparent 40%),
        linear-gradient(180deg, rgba(255, 252, 247, 0.96) 0%, rgba(251, 241, 228, 0.98) 100%);
      border: 1px solid var(--line);
      overflow: hidden;
    }

    .hero-art::before,
    .hero-art::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      background: rgba(191, 107, 70, 0.1);
    }

    .hero-art::before {
      width: 180px;
      height: 180px;
      top: -40px;
      right: -20px;
    }

    .hero-art::after {
      width: 140px;
      height: 140px;
      left: -28px;
      bottom: -28px;
    }

    .pet-badge {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 122px;
      height: 122px;
      border-radius: 32px;
      background: rgba(255, 252, 247, 0.92);
      border: 1px solid rgba(143, 66, 39, 0.14);
      box-shadow: 0 16px 34px rgba(74, 44, 26, 0.12);
      padding: 14px;
    }

    .pet-badge img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .pet-badge.one { top: 34px; left: 30px; transform: rotate(-6deg); }
    .pet-badge.two { top: 62px; right: 42px; transform: rotate(7deg); }
    .pet-badge.three { bottom: 86px; left: 86px; transform: rotate(4deg); }
    .pet-badge.four { bottom: 34px; right: 56px; transform: rotate(-5deg); }

    .speech-chip {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      padding: 14px 18px;
      border-radius: 999px;
      background: rgba(255, 250, 244, 0.95);
      border: 1px solid rgba(143, 66, 39, 0.16);
      color: var(--accent-strong);
      font-weight: 800;
      letter-spacing: 0.02em;
      box-shadow: 0 10px 24px rgba(74, 44, 26, 0.08);
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
    }

    .card {
      padding: 28px;
    }

    .card.full {
      grid-column: 1 / -1;
    }

    .character-showcase {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-top: 18px;
    }

    .character-card {
      padding: 20px 18px;
      background: var(--surface-strong);
      border: 1px solid var(--line);
      border-radius: 24px;
      text-align: center;
    }

    .character-card img {
      width: 100%;
      max-width: 124px;
      height: 124px;
      object-fit: contain;
      display: block;
      margin: 0 auto 10px;
    }

    .character-name {
      font-weight: 800;
      color: var(--accent-strong);
      margin-bottom: 4px;
    }

    .character-note {
      color: var(--muted);
      font-size: 0.94rem;
      margin: 0;
    }

    .media-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      margin-top: 18px;
    }

    .media-card {
      overflow: hidden;
      border-radius: 24px;
      border: 1px solid var(--line);
      background: var(--surface-strong);
    }

    .media-card img {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      background: #f5ece1;
    }

    .media-copy {
      padding: 16px 18px 18px;
    }

    .media-title {
      font-weight: 800;
      color: var(--accent-strong);
      margin-bottom: 6px;
    }

    .media-note {
      color: var(--muted);
      font-size: 0.95rem;
      margin: 0;
    }

    ul {
      margin: 0;
      padding-left: 18px;
    }

    li + li {
      margin-top: 8px;
    }

    .muted { color: var(--muted); }

    .inline-note {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .page-links {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 14px;
    }

    .page-link {
      display: block;
      padding: 18px;
      background: var(--surface-strong);
      border: 1px solid var(--line);
      border-radius: 20px;
      text-decoration: none;
      color: inherit;
    }

    .page-link strong {
      display: block;
      margin-bottom: 6px;
      color: var(--accent-strong);
    }

    .support-card {
      scroll-margin-top: 24px;
      background:
        radial-gradient(circle at top right, rgba(255, 212, 170, 0.42), transparent 35%),
        radial-gradient(circle at bottom left, rgba(255, 233, 204, 0.64), transparent 32%),
        linear-gradient(180deg, rgba(255, 250, 244, 0.98) 0%, rgba(250, 238, 223, 0.96) 100%);
      position: relative;
      overflow: hidden;
    }

    .support-card::after {
      content: "";
      position: absolute;
      right: -26px;
      bottom: -26px;
      width: 136px;
      height: 136px;
      border-radius: 999px;
      background: rgba(191, 107, 70, 0.08);
    }

    .support-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(191, 107, 70, 0.12);
      color: var(--accent-strong);
      font-size: 0.92rem;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .support-card .cta-row {
      margin-top: 18px;
    }

    .support-card h2,
    .support-card p,
    .support-card .cta-row,
    .support-card .inline-note,
    .support-card .support-kicker,
    .support-card .support-points {
      position: relative;
      z-index: 1;
    }

    .support-points {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 16px;
    }

    .support-point {
      padding: 14px 12px;
      border-radius: 18px;
      border: 1px solid rgba(143, 66, 39, 0.12);
      background: rgba(255, 252, 247, 0.72);
      text-align: center;
    }

    .support-point strong {
      display: block;
      color: var(--accent-strong);
      font-size: 0.96rem;
      margin-bottom: 4px;
    }

    .support-point span {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .support-card .pill.primary-support {
      background: var(--accent);
      color: #fff9f5;
      border-color: transparent;
    }

    code {
      font-family: "SFMono-Regular", "SF Mono", ui-monospace, monospace;
      font-size: 0.92em;
      background: rgba(143, 66, 39, 0.08);
      padding: 2px 6px;
      border-radius: 8px;
    }

    footer {
      padding-top: 18px;
      text-align: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .language-modal[hidden],
    .support-modal[hidden] {
      display: none;
    }

    .language-modal,
    .support-modal {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 20px;
      background: var(--overlay);
      z-index: 20;
    }

    .language-sheet,
    .support-sheet {
      width: min(100%, 460px);
      padding: 28px;
    }

    .language-sheet h2,
    .support-sheet h2 {
      margin-bottom: 8px;
    }

    .language-sheet p,
    .support-sheet p {
      color: var(--muted);
      margin-bottom: 20px;
    }

    .support-sheet {
      width: min(100%, 540px);
    }

    .support-options {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 12px;
      margin: 16px 0 18px;
    }

    .support-option {
      text-align: left;
      background: var(--surface-strong);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px 16px;
    }

    .support-option .support-qr {
      display: grid;
      place-items: center;
      width: 100%;
      max-width: 320px;
      aspect-ratio: 1 / 1;
      margin: 12px auto 10px;
      border-radius: 16px;
      border: 1px dashed rgba(143, 66, 39, 0.24);
      background:
        linear-gradient(135deg, rgba(255, 250, 244, 0.96), rgba(248, 238, 225, 0.92));
      color: var(--muted);
      font-size: 0.88rem;
      text-align: center;
      padding: 10px;
    }

    .support-option .support-qr img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 14px;
      display: block;
    }

    .support-option .support-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 10px;
      color: var(--accent-strong);
      font-weight: 700;
      text-decoration: none;
    }

    .support-option .support-link:hover {
      text-decoration: underline;
    }

    .support-option code {
      display: inline-block;
      margin-top: 6px;
      word-break: break-word;
    }

    .support-option strong {
      display: block;
      color: var(--accent-strong);
      margin-bottom: 6px;
      font-size: 1rem;
    }

    .support-option span {
      display: block;
      color: var(--muted);
      font-size: 0.94rem;
      line-height: 1.5;
    }

    .support-sheet .inline-note {
      margin-top: 0;
      margin-bottom: 16px;
    }

    @media (max-width: 860px) {
      .hero-layout,
      .character-showcase,
      .hero-meta,
      .media-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 760px) {
      .wrap {
        width: min(100% - 20px, 1080px);
        padding: 20px 0 32px;
      }

      .hero,
      .card,
      .language-sheet {
        border-radius: 22px;
      }

      .hero {
        padding: 28px 20px;
      }

      .card,
      .language-sheet {
        padding: 22px 20px;
      }

      .hero-top {
        flex-direction: column;
        align-items: stretch;
      }

      .hero-layout,
      .grid,
      .page-links,
      .hero-meta,
      .character-showcase,
      .media-grid {
        grid-template-columns: 1fr;
      }

      .hero-art {
        min-height: 320px;
      }

      .pet-badge {
        width: 104px;
        height: 104px;
      }

      .language-actions {
        flex-direction: column;
      }

      .support-points {
        grid-template-columns: 1fr;
      }

      .support-options {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="hero-layout">
        <div>
          <div class="hero-top">
            <p class="eyebrow">TinyPaws</p>
            <div class="switcher language-switcher" data-aria-label-key="switcherAriaLabel">
              <button type="button" data-set-language="ko" data-i18n="switchKorean"></button>
              <button type="button" data-set-language="en" data-i18n="switchEnglish"></button>
            </div>
          </div>
          <h1 data-i18n="heroTitle"></h1>
          <p class="lead" data-i18n="heroLead"></p>
          <div class="actions">
            <a class="btn primary" href="./downloads/TinyPaws.dmg" data-i18n="downloadButton"></a>
            <a class="btn secondary" href="./release-notes/1.0.2.html" data-i18n="releaseNotesButton"></a>
            <a class="btn secondary" href="./support.html" data-i18n="supportButton"></a>
            <a class="btn secondary" href="./privacy.html" data-i18n="privacyButton"></a>
          </div>
          <div class="hero-meta">
            <div class="meta-block">
              <span class="meta-label" data-i18n="metaVersionLabel"></span>
              <span class="meta-value" data-i18n="metaVersionValue"></span>
            </div>
            <div class="meta-block">
              <span class="meta-label" data-i18n="metaPlatformLabel"></span>
              <span class="meta-value" data-i18n="metaPlatformValue"></span>
            </div>
            <div class="meta-block">
              <span class="meta-label" data-i18n="metaUpdatesLabel"></span>
              <span class="meta-value" data-i18n="metaUpdatesValue"></span>
            </div>
            <div class="meta-block">
              <span class="meta-label" data-i18n="metaFeedLabel"></span>
              <span class="meta-value"><code>appcast.xml</code></span>
            </div>
          </div>
        </div>
        <div class="hero-art" aria-hidden="true">
          <div class="pet-badge one"><img src="./characters/cat.png" alt=""></div>
          <div class="pet-badge two"><img src="./characters/capybara.png" alt=""></div>
          <div class="pet-badge three"><img src="./characters/poodle.png" alt=""></div>
          <div class="pet-badge four"><img src="./characters/hamster.png" alt=""></div>
          <div class="speech-chip" data-i18n="heroArtLabel"></div>
        </div>
      </div>
    </section>

    <section class="grid">
      <article class="card full">
        <h2 data-i18n="charactersTitle"></h2>
        <p class="muted" data-i18n="charactersBody"></p>
        <div class="character-showcase">
          <div class="character-card">
            <img src="./characters/cat.png" alt="Cat character">
            <div class="character-name" data-i18n="characterCatName"></div>
            <p class="character-note" data-i18n="characterCatNote"></p>
          </div>
          <div class="character-card">
            <img src="./characters/capybara.png" alt="Capybara character">
            <div class="character-name" data-i18n="characterCapybaraName"></div>
            <p class="character-note" data-i18n="characterCapybaraNote"></p>
          </div>
          <div class="character-card">
            <img src="./characters/poodle.png" alt="Poodle character">
            <div class="character-name" data-i18n="characterPoodleName"></div>
            <p class="character-note" data-i18n="characterPoodleNote"></p>
          </div>
          <div class="character-card">
            <img src="./characters/hamster.png" alt="Hamster character">
            <div class="character-name" data-i18n="characterHamsterName"></div>
            <p class="character-note" data-i18n="characterHamsterNote"></p>
          </div>
        </div>
      </article>

      <article class="card full">
        <h2 data-i18n="mediaTitle"></h2>
        <p class="muted" data-i18n="mediaBody"></p>
        <div class="media-grid">
          <div class="media-card">
            <img src="./media/main.png" alt="TinyPaws main view">
            <div class="media-copy">
              <div class="media-title" data-i18n="mediaCard1Title"></div>
              <p class="media-note" data-i18n="mediaCard1Body"></p>
            </div>
          </div>
          <div class="media-card">
            <img src="./media/characters.png" alt="TinyPaws character selection">
            <div class="media-copy">
              <div class="media-title" data-i18n="mediaCard2Title"></div>
              <p class="media-note" data-i18n="mediaCard2Body"></p>
            </div>
          </div>
          <div class="media-card">
            <img src="./media/customize.png" alt="TinyPaws customization controls">
            <div class="media-copy">
              <div class="media-title" data-i18n="mediaCard3Title"></div>
              <p class="media-note" data-i18n="mediaCard3Body"></p>
            </div>
          </div>
          <div class="media-card">
            <img src="./media/animation.png" alt="TinyPaws animation preview">
            <div class="media-copy">
              <div class="media-title" data-i18n="mediaCard4Title"></div>
              <p class="media-note" data-i18n="mediaCard4Body"></p>
            </div>
          </div>
        </div>
      </article>

      <article class="card">
        <h2 data-i18n="downloadTitle"></h2>
        <p class="muted" data-i18n="downloadBody"></p>
        <div class="cta-row">
          <a class="pill" href="./downloads/TinyPaws.dmg" data-i18n="downloadPrimary"></a>
          <a class="pill" href="./appcast.xml" data-i18n="downloadSecondary"></a>
        </div>
        <p class="inline-note" data-i18n="downloadNote"></p>
      </article>

      <article class="card">
        <h2 data-i18n="aboutTitle"></h2>
        <ul>
          <li data-i18n="aboutItem1"></li>
          <li data-i18n="aboutItem2"></li>
          <li data-i18n="aboutItem3"></li>
          <li data-i18n="aboutItem4"></li>
        </ul>
      </article>

      <article class="card">
        <h2 data-i18n="updatesTitle"></h2>
        <ul>
          <li data-i18n="updatesItem1"></li>
          <li data-i18n="updatesItem2"></li>
          <li data-i18n="updatesItem3"></li>
        </ul>
      </article>

      <article class="card">
        <h2 data-i18n="contactTitle"></h2>
        <p class="muted" data-i18n="developerLabel"></p>
        <p><a href="mailto:dbsdudwl94@gmail.com">dbsdudwl94@gmail.com</a></p>
        <p class="muted" data-i18n="responseTime"></p>
      </article>

      <article class="card support-card full" id="buy-developer-a-coffee">
        <div class="support-kicker" data-i18n="coffeeKicker"></div>
        <h2 data-i18n="coffeeTitle"></h2>
        <p class="muted" data-i18n="coffeeBody"></p>
        <div class="support-points" aria-hidden="true">
          <div class="support-point">
            <strong data-i18n="coffeePoint1Title"></strong>
            <span data-i18n="coffeePoint1Body"></span>

    const elements = document.querySelectorAll("[data-i18n]");
    const switchButtons = document.querySelectorAll("[data-set-language]");
    const ariaLabelElements = document.querySelectorAll("[data-aria-label-key]");
    const modal = document.getElementById("languageModal");
    const supportModal = document.getElementById("supportModal");
    const supportOpenButtons = document.querySelectorAll("[data-open-support-modal]");
    const supportOptions = document.querySelectorAll("[data-support-option]");
    const descriptionMeta = document.querySelector('meta[name="description"]');

    function applyLanguage(language) {
      const lang = translations[language] ? language : "en";
      const copy = translations[lang];

      elements.forEach((element) => {
        const key = element.dataset.i18n;
        element.textContent = copy[key];
      });

      ariaLabelElements.forEach((element) => {
        const key = element.dataset.ariaLabelKey;
        element.setAttribute("aria-label", copy[key]);
      });

      document.documentElement.lang = lang;
      document.title = copy.pageTitle;
      descriptionMeta.setAttribute("content", copy.metaDescription);
      document.documentElement.dataset.language = lang;

      switchButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.setLanguage === lang);
      });
    }

    function chooseLanguage(language) {
      localStorage.setItem(storageKey, language);
      applyLanguage(language);
      modal.hidden = true;
      scrollToHashTarget();
    }

    switchButtons.forEach((button) => {
      button.addEventListener("click", () => chooseLanguage(button.dataset.setLanguage));
    });

    function openSupportModal(target) {
      supportOptions.forEach((option) => {
        option.hidden = option.dataset.supportOption !== target;
      });
      supportModal.hidden = false;
    }

    function closeSupportModal() {
      supportModal.hidden = true;
    }

    function scrollToHashTarget() {
      if (!window.location.hash) return;

      const target = document.querySelector(window.location.hash);
      if (!target) return;

      requestAnimationFrame(() => {
        target.scrollIntoView({ block: "start" });
      });
    }

    supportOpenButtons.forEach((button) => {
      button.addEventListener("click", () => openSupportModal(button.dataset.openSupportModal));
    });

    supportModal.addEventListener("click", (event) => {
      if (event.target === supportModal) {
        closeSupportModal();
      }
    });

    const storedLanguage = localStorage.getItem(storageKey);

    if (storedLanguage) {
      applyLanguage(storedLanguage);
    } else {
      applyLanguage("ko");
      modal.hidden = false;
    }

    window.addEventListener("hashchange", scrollToHashTarget);
    window.addEventListener("load", scrollToHashTarget);

    document.documentElement.classList.add("ready");
    scrollToHashTarget();
  </script>
